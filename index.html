<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Oil Intelligence Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  user-select:none;
}

body{
  background:#0b0c10;
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

.app{
  width:100%;
  max-width:420px;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

.header h1{
  font-size:24px;
  font-weight:700;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.1);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:#00a8ff;color:white;}
.danger{background:#ff3b30;color:white;}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:600;
  letter-spacing:0.3px;
}

.safe{background:#1dd1a1;color:black;}
.warn{background:#feca57;color:black;}
.dangerStatus{background:#ff6b6b;color:white;}

.engine-wrap{
  height:14px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.engine{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#1dd1a1,#feca57,#ff6b6b);
  transition:0.5s ease;
}

.small{
  font-size:12px;
  opacity:0.7;
}

.flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.history-card{
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.08);
  font-size:12px;
}

.footer{
  text-align:center;
  font-size:11px;
  opacity:0.6;
  margin-top:10px;
  padding-bottom:10px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Oil Intelligence Pro+</h1>
    <p class="small">SMART OIL TRACKING SYSTEM</p>
  </div>

  <div class="card">
    <div class="flex">
      <div>
        <b id="oilName">🛢️ Shell Advance AX7 10W-40</b>
        <div class="small">Semi Synthetic • Harian</div>
      </div>
      <div id="status" class="badge safe">AMAN</div>
    </div>

    <div style="margin-top:10px">
      KM: <b id="km">0</b><br>
      Sisa: <b id="sisa">3000</b> km
    </div>

    <div class="engine-wrap">
      <div class="engine" id="engine"></div>
    </div>

    <div id="warning" class="small"></div>
    <div class="small" id="gps">📡 GPS: Menunggu...</div>
    <div class="small" id="estimasi">⏳ Estimasi ±25 hari</div>
  </div>

  <div class="card">
    <button class="primary" onclick="startGPS()">📡 Start Tracking</button>
    <button class="danger" onclick="resetOli()">🛢️ Reset Oli</button>
  </div>

  <div class="card">
    <b class="small">📍 History Perjalanan</b>
    <div id="history"></div>
  </div>

  <div class="footer">
    © 2026 Tracking System • Zulfahmi Afnula
  </div>

</div>

<script>

/* ================= CONFIG ================= */
const SUPABASE_URL = "https://wepqievfgfqsoilynrhc.supabase.co";
const SUPABASE_KEY = "sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1.";
const TABLE = "oil_logs";

const LIMIT = 3000;

/* ================= STATE ================= */
let totalKm = 0;
let lastLat = null;
let lastLng = null;
let watchId = null;

let startTime = Date.now();
let lastMoveTime = Date.now();
let isStopped = false;

/* speed tracking */
let speedSum = 0;
let speedCount = 0;
let maxSpeed = 0;

/* session */
let sessionId = localStorage.getItem("session_id");

if(!sessionId){
  sessionId = crypto.randomUUID();
  localStorage.setItem("session_id", sessionId);
}

/* ================= START SESSION ================= */
async function startSession(){

  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      session_id: sessionId,
      km: 0,
      status: "START",
      start_time: new Date().toISOString()
    })
  });
}

/* ================= START GPS ================= */
window.startGPS = async function(){

  isStopped = false;
  startTime = Date.now();
  lastMoveTime = Date.now();

  await startSession();

  document.getElementById("gps").innerText = "📡 GPS aktif...";

  watchId = navigator.geolocation.watchPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const speed = (pos.coords.speed || 0) * 3.6;

    /* SPEED TRACK */
    speedSum += speed;
    speedCount++;

    if(speed > maxSpeed){
      maxSpeed = speed;
    }

    let avgSpeed = speedCount ? (speedSum / speedCount) : 0;

    document.getElementById("gps").innerText =
      `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)} | ${speed.toFixed(1)} km/h`;

    if(lastLat !== null){

      const dist = calcDistance(lastLat,lastLng,lat,lng);

      if(dist > 0.01 && dist < 2){

        totalKm += dist;
        lastMoveTime = Date.now();

        render();

        updateCloud(avgSpeed, speed);
      }
    }

    lastLat = lat;
    lastLng = lng;

    smartIdle();

  },{
    enableHighAccuracy:true,
    maximumAge:1000,
    timeout:15000
  });
};

/* ================= UPDATE CLOUD ================= */
async function updateCloud(avgSpeed, currentSpeed){

  const duration = (Date.now() - startTime) / 1000;

  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?session_id=eq.${sessionId}`,{
    method:"PATCH",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      km: totalKm,
      remaining_km: Math.max(0, LIMIT - totalKm),
      status: "MOVING",

      avg_speed: avgSpeed,
      max_speed: maxSpeed,

      duration_seconds: duration,
      current_speed: currentSpeed,

      updated_at: new Date().toISOString()
    })
  });
}

/* ================= STOP ================= */
async function stopTracking(reason){

  if(isStopped) return;
  isStopped = true;

  navigator.geolocation.clearWatch(watchId);

  const duration = (Date.now() - startTime) / 1000;
  let avgSpeed = speedCount ? (speedSum / speedCount) : 0;

  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?session_id=eq.${sessionId}`,{
    method:"PATCH",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      status: reason,
      km: totalKm,
      remaining_km: Math.max(0, LIMIT - totalKm),

      avg_speed: avgSpeed,
      max_speed: maxSpeed,
      duration_seconds: duration,

      end_time: new Date().toISOString()
    })
  });

  loadHistory();
}

/* ================= IDLE ================= */
function smartIdle(){
  const idle = Date.now() - lastMoveTime;
  if(idle > 180000) stopTracking("IDLE");
  if(idle > 300000) stopTracking("STOP");
}

/* ================= DISTANCE ================= */
function calcDistance(lat1,lon1,lat2,lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ================= HISTORY ================= */
async function loadHistory(){

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc&limit=10`,
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  document.getElementById("history").innerHTML =
    data.map(d=>`
      <div class="history-card">
        🚗 KM: ${d.km}<br>
        ⏱️ Durasi: ${Math.round(d.duration_seconds || 0)} detik<br>
        ⚡ AVG: ${d.avg_speed?.toFixed(1) || 0} km/h<br>
        🔥 MAX: ${d.max_speed?.toFixed(1) || 0} km/h<br>
        ⚠️ ${d.status}<br>
        📅 ${new Date(d.created_at).toLocaleString()}
      </div>
    `).join("");
}

/* ================= UI ================= */
function render(){

  document.getElementById("km").innerText = totalKm.toFixed(2);

  let sisa = LIMIT - totalKm;
  document.getElementById("sisa").innerText = sisa.toFixed(0);

  let percent = Math.min((totalKm/LIMIT)*100,100);
  document.getElementById("engine").style.width = percent + "%";
}

/* ================= RESET ================= */
window.resetOli = function(){
  totalKm = 0;
  render();
};

render();
loadHistory();

</script>

</body>
</html>
