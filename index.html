<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Oil Intelligence Pro+ Manual</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;user-select:none;}

body{
  background:#0b0c10;
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

.app{width:100%;max-width:420px;}

.header{text-align:center;margin-bottom:15px;}
.header h1{font-size:24px;font-weight:700;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.1);
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:#00a8ff;color:white;}
.danger{background:#ff3b30;color:white;}

.small{font-size:12px;opacity:0.7;}

.engine-wrap{
  height:14px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.engine{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#1dd1a1,#feca57,#ff6b6b);
  transition:0.5s ease;
}

.history-card{
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.08);
  font-size:12px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Oil Manual Tracker</h1>
    <p class="small">INPUT KM MANUAL • TETAP TERHUBUNG DATABASE</p>
  </div>

  <div class="card">
    <b>Total KM</b><br>
    <span id="km">0</span> km

    <div class="engine-wrap">
      <div class="engine" id="engine"></div>
    </div>

    <div class="small">Sisa: <span id="sisa">3000</span> km</div>
  </div>

  <div class="card">
    <input type="number" id="kmInput" placeholder="Masukkan KM perjalanan..." />
    <button class="primary" onclick="addKM()">➕ Tambah KM</button>
    <button class="danger" onclick="resetOli()">🛢️ Reset</button>
  </div>

  <div class="card">
    <b class="small">📍 History</b>
    <div id="history"></div>
  </div>

</div>

<script>

const SUPABASE_URL = "https://wepqievfgfqsoilynrhc.supabase.co";
const SUPABASE_KEY = "sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1.";
const TABLE = "oil_logs";
const LIMIT = 3000;

let totalKm = 0;

let sessionId = localStorage.getItem("session_id");
if(!sessionId){
  sessionId = crypto.randomUUID();
  localStorage.setItem("session_id", sessionId);
}

const saved = localStorage.getItem("cached_km");
if(saved) totalKm = parseFloat(saved);

/* INIT SESSION */
async function startSession(){
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      session_id:sessionId,
      km:0,
      status:"START_MANUAL",
      start_time:new Date().toISOString()
    })
  });
}

/* ADD KM MANUAL */
window.addKM = async function(){

  let km = parseFloat(document.getElementById("kmInput").value);
  if(!km || km <= 0) return alert("KM tidak valid");

  totalKm += km;

  localStorage.setItem("cached_km", totalKm);

  render();

  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      session_id:sessionId,
      km:totalKm,
      added_km:km,
      status:"MANUAL_ENTRY",
      created_at:new Date().toISOString()
    })
  });

  document.getElementById("kmInput").value = "";

  loadHistory();
};

/* HISTORY */
async function loadHistory(){

  let res = await fetch(
    `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc&limit=10`,
    {
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY
      }
    }
  );

  let data = await res.json();

  document.getElementById("history").innerHTML =
    data.map(d=>`
      <div class="history-card">
        KM: ${d.km}<br>
        +${d.added_km || 0} km<br>
        STATUS: ${d.status}<br>
        ${new Date(d.created_at).toLocaleString()}
      </div>
    `).join("");
}

/* UI */
function render(){
  document.getElementById("km").innerText = totalKm.toFixed(2);
  document.getElementById("sisa").innerText = (LIMIT-totalKm).toFixed(0);
  document.getElementById("engine").style.width = (totalKm/LIMIT*100)+"%";
}

/* RESET */
window.resetOli = function(){
  totalKm = 0;
  localStorage.removeItem("cached_km");
  render();
  loadHistory();
};

render();
loadHistory();

</script>

</body>
</html>
