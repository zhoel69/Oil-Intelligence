<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Oil Intelligence Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;user-select:none;}

body{
  background:#0b0c10;
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

.app{width:100%;max-width:420px;}

.header{text-align:center;margin-bottom:15px;}
.header h1{font-size:24px;font-weight:700;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.1);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:#00a8ff;color:white;}
.danger{background:#ff3b30;color:white;}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:600;
}

.safe{background:#1dd1a1;color:black;}

.engine-wrap{height:14px;background:#222;border-radius:999px;overflow:hidden;margin-top:10px;}
.engine{height:100%;width:0%;background:linear-gradient(90deg,#1dd1a1,#feca57,#ff6b6b);transition:0.5s ease;}

.small{font-size:12px;opacity:0.7;}

.flex{display:flex;justify-content:space-between;align-items:center;}

.history-card{
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.08);
  font-size:12px;
}

.footer{text-align:center;font-size:11px;opacity:0.6;margin-top:10px;}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Oil Intelligence Pro+</h1>
    <p class="small">SMART OIL TRACKING SYSTEM</p>
  </div>

  <div class="card">
    <div class="flex">
      <div>
        <b>🛢️ Shell Advance AX7 10W-40</b>
        <div class="small">Semi Synthetic • Harian</div>
      </div>
      <div class="badge safe">AMAN</div>
    </div>

    <div style="margin-top:10px">
      KM: <b id="km">0</b><br>
      Sisa: <b id="sisa">3000</b> km
    </div>

    <div class="engine-wrap">
      <div class="engine" id="engine"></div>
    </div>

    <div class="small" id="gps">📡 GPS: Menunggu...</div>
    <div class="small" id="estimasi">⏳ Estimasi ±25 hari</div>
  </div>

  <div class="card">
    <button class="primary" onclick="startGPS()">📡 Start Tracking</button>
    <button class="danger" onclick="stopTracking('MANUAL_STOP')">⛔ Stop Manual</button>
    <button class="danger" onclick="resetOli()">🛢️ Reset</button>
  </div>

  <div class="card">
    <b class="small">📍 History Perjalanan</b>
    <div id="history"></div>
  </div>

</div>

<script>

const SUPABASE_URL="https://wepqievfgfqsoilynrhc.supabase.co";
const SUPABASE_KEY="sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1.";
const TABLE="oil_logs";
const LIMIT=3000;

let totalKm=0;
let lastLat=null,lastLng=null;
let watchId=null;

let isStopped=false;
let lastMoveTime=Date.now();

let speedSum=0;
let speedCount=0;
let trackCount=0;

let distBuffer=[];

let sessionId=localStorage.getItem("session_id")||crypto.randomUUID();
localStorage.setItem("session_id",sessionId);

let saved=localStorage.getItem("cached_km");
if(saved) totalKm=parseFloat(saved);

/* SESSION */
async function startSession(){
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      session_id:sessionId,
      km:0,
      status:"START",
      start_time:new Date().toISOString()
    })
  });
}

/* START GPS (FIX REAL TRIGGER) */
window.startGPS=async function(){

  if(!navigator.geolocation){
    alert("GPS tidak support");
    return;
  }

  isStopped=false;
  lastMoveTime=Date.now();

  await startSession();

  document.getElementById("gps").innerText="📡 Meminta izin lokasi...";

  /* 🔥 FIX: force permission prompt REAL */
  navigator.geolocation.getCurrentPosition(
    ()=>{},
    ()=>{},
    {enableHighAccuracy:true}
  );

  watchId=navigator.geolocation.watchPosition((pos)=>{

    if(isStopped) return;

    let lat=pos.coords.latitude;
    let lng=pos.coords.longitude;
    let speed=(pos.coords.speed||0)*3.6;

    trackCount++;

    document.getElementById("gps").innerHTML=
    `📍 LAT:${lat.toFixed(6)}<br>
     📍 LNG:${lng.toFixed(6)}<br>
     🚀 SPEED:${speed.toFixed(1)} km/h<br>
     📡 POINT:${trackCount}`;

    speedSum+=speed;
    speedCount++;

    if(lastLat!==null){

      let d=calcDistance(lastLat,lastLng,lat,lng);

      distBuffer.push(d);
      if(distBuffer.length>5) distBuffer.shift();

      let avg=distBuffer.reduce((a,b)=>a+b,0)/distBuffer.length;

      if(avg>0.0005){
        totalKm+=avg;
        lastMoveTime=Date.now();

        localStorage.setItem("cached_km",totalKm);

        render();
        updateCloud(speedSum/speedCount,speed);
        estimate();
      }
    }

    lastLat=lat;
    lastLng=lng;

    smartIdle();

  },{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:20000
  });

  loadHistory();
};

/* STOP */
window.stopTracking=async function(reason){

  if(isStopped) return;
  isStopped=true;

  navigator.geolocation.clearWatch(watchId);

  document.getElementById("gps").innerText="⛔ STOP: "+reason;

  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?session_id=eq.${sessionId}`,{
    method:"PATCH",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      status:reason,
      km:totalKm,
      end_time:new Date().toISOString()
    })
  });

  loadHistory();
};

/* CLOUD */
async function updateCloud(avgSpeed,currentSpeed){
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?session_id=eq.${sessionId}`,{
    method:"PATCH",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      km:totalKm,
      status:"MOVING",
      avg_speed:avgSpeed,
      current_speed:currentSpeed
    })
  });
}

/* ESTIMASI FIX */
function estimate(){
  let avg=speedCount?speedSum/speedCount:0;
  if(avg<=0) return;

  let sisa=LIMIT-totalKm;
  let jam=sisa/(avg||1);

  document.getElementById("estimasi").innerText=
  "⏳ Estimasi ±"+(jam/24).toFixed(1)+" hari";
}

/* AUTO STOP */
function smartIdle(){
  let idle=Date.now()-lastMoveTime;
  if(idle>180000) stopTracking("IDLE");
}

/* DISTANCE */
function calcDistance(a,b,c,d){
  const R=6371;
  let dLat=(c-a)*Math.PI/180;
  let dLon=(d-b)*Math.PI/180;

  let x=
    Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

/* HISTORY FIX ALWAYS LOAD */
async function loadHistory(){

  let res=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc&limit=10`,{
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY
    }
  });

  let data=await res.json();

  document.getElementById("history").innerHTML=
  data.map(d=>`
    <div class="history-card">
      KM:${d.km}<br>
      STATUS:${d.status}<br>
      ${new Date(d.created_at).toLocaleString()}
    </div>
  `).join("");
}

/* UI */
function render(){
  document.getElementById("km").innerText=totalKm.toFixed(2);
  document.getElementById("sisa").innerText=(LIMIT-totalKm).toFixed(0);
  document.getElementById("engine").style.width=(totalKm/LIMIT*100)+"%";
}

/* RESET */
window.resetOli=function(){
  totalKm=0;
  localStorage.removeItem("cached_km");
  render();
};

/* INIT */
render();
loadHistory();

</script>

</body>
</html>
