<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Oil Intelligence Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  user-select:none;
}

body{
  background:#0b0c10;
  display:flex;
  justify-content:center;
  padding:20px;
  color:white;
}

.app{
  width:100%;
  max-width:420px;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

.header h1{
  font-size:24px;
  font-weight:700;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.1);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:#00a8ff;color:white;}
.danger{background:#ff3b30;color:white;}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:600;
}

.safe{background:#1dd1a1;color:black;}

.engine-wrap{
  height:14px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.engine{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#1dd1a1,#feca57,#ff6b6b);
  transition:0.5s ease;
}

.small{font-size:12px;opacity:0.7;}

.history-card{
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.08);
  font-size:12px;
}

.footer{
  text-align:center;
  font-size:11px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Oil Intelligence Pro+</h1>
    <p class="small">SMART OIL TRACKING SYSTEM</p>
  </div>

  <div class="card">
    <b id="oilName">🛢️ Shell Advance AX7 10W-40</b>

    <div style="margin-top:10px">
      KM: <b id="km">0</b><br>
      Sisa: <b id="sisa">3000</b> km
    </div>

    <div class="engine-wrap">
      <div class="engine" id="engine"></div>
    </div>

    <div class="small" id="gps">📡 GPS: Menunggu...</div>
  </div>

  <div class="card">
    <button class="primary" onclick="startGPS()">📡 Start Tracking</button>
    <button class="danger" onclick="resetOli()">🛢️ Reset Oli</button>
  </div>

  <div class="card">
    <b class="small">📍 History</b>
    <div id="history"></div>
  </div>

</div>

<script>

/* ================= CONFIG ================= */
const SUPABASE_URL = "https://wepqievfgfqsoilynrhc.supabase.co";
const SUPABASE_KEY = "sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1.";
const TABLE = "oil_logs";
const LIMIT = 3000;

/* ================= STATE ================= */
let totalKm = 0;
let lastLat = null;
let lastLng = null;
let watchId;

let startTime = 0;
let lastMoveTime = Date.now();
let isStopped = false;

let speedSum = 0;
let speedCount = 0;
let maxSpeed = 0;

let trackCount = 0;
let isInBackground = false;

let lastUpdate = 0;
const THROTTLE = 2500;

let distBuffer = [];

/* ================= SESSION ================= */
let sessionId = localStorage.getItem("session_id");
if(!sessionId){
  sessionId = crypto.randomUUID();
  localStorage.setItem("session_id", sessionId);
}

const saved = localStorage.getItem("cached_km");
if(saved) totalKm = parseFloat(saved);

/* ================= SESSION START ================= */
async function startSession(){
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      session_id: sessionId,
      km: 0,
      status: "START",
      start_time: new Date().toISOString()
    })
  });
}

/* ================= GPS ================= */
window.startGPS = async function(){

  isStopped = false;
  startTime = Date.now();
  lastMoveTime = Date.now();

  await startSession();

  document.getElementById("gps").innerText = "📡 GPS aktif...";

  watchId = navigator.geolocation.watchPosition(async (pos)=>{

    if(isInBackground || isStopped) return;

    const now = Date.now();
    if(now - lastUpdate < THROTTLE) return;
    lastUpdate = now;

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;
    let speed = (pos.coords.speed ?? 0) * 3.6;

    if(speed > 180) return;

    trackCount++;

    document.getElementById("gps").innerText =
      `📍 LAT ${lat.toFixed(5)} | LNG ${lng.toFixed(5)} | 🚀 ${speed.toFixed(1)} km/h`;

    speedSum += speed;
    speedCount++;
    if(speed > maxSpeed) maxSpeed = speed;

    if(lastLat !== null){

      let dist = calcDistance(lastLat,lastLng,lat,lng);

      distBuffer.push(dist);
      if(distBuffer.length > 5) distBuffer.shift();

      let smooth = distBuffer.reduce((a,b)=>a+b,0)/distBuffer.length;

      if(smooth > 0.2) return;

      if(smooth > 0.0005){
        totalKm += smooth;
        lastMoveTime = Date.now();

        localStorage.setItem("cached_km", totalKm);

        render();
        updateCloud(speedSum/speedCount, speed);
      }
    }

    lastLat = lat;
    lastLng = lng;

    smartIdle();

  },{
    enableHighAccuracy:true,
    maximumAge:1000,
    timeout:20000
  });
};

/* ================= BACKGROUND ================= */
document.addEventListener("visibilitychange",()=>{
  isInBackground = document.hidden;
});

/* ================= CLOUD ================= */
async function updateCloud(avgSpeed,currentSpeed){

  const duration = (Date.now() - startTime)/1000;

  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?session_id=eq.${sessionId}`,{
    method:"PATCH",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      km: totalKm,
      remaining_km: Math.max(0,LIMIT-totalKm),
      status:"MOVING",
      avg_speed: avgSpeed,
      max_speed: maxSpeed,
      current_speed: currentSpeed,
      duration_seconds: duration
    })
  });
}

/* ================= STOP ================= */
async function stopTracking(reason){

  if(isStopped) return;
  isStopped = true;

  navigator.geolocation.clearWatch(watchId);

  const duration = (Date.now()-startTime)/1000;

  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?session_id=eq.${sessionId}`,{
    method:"PATCH",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      status:reason,
      km:totalKm,
      remaining_km:Math.max(0,LIMIT-totalKm),
      duration_seconds:duration,
      end_time:new Date().toISOString()
    })
  });

  loadHistory();
}

/* ================= AUTO IDLE STOP ================= */
function smartIdle(){
  const idle = Date.now()-lastMoveTime;
  if(idle>180000) stopTracking("IDLE");
  if(idle>300000) stopTracking("STOP");
}

/* ================= DISTANCE ================= */
function calcDistance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;

  const a=
    Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ================= UI ================= */
function render(){
  document.getElementById("km").innerText=totalKm.toFixed(2);
  document.getElementById("sisa").innerText=(LIMIT-totalKm).toFixed(0);
  document.getElementById("engine").style.width=
    Math.min((totalKm/LIMIT)*100,100)+"%";
}

/* ================= RESET ================= */
window.resetOli=function(){
  totalKm=0;
  localStorage.removeItem("cached_km");
  render();
};

/* ================= HISTORY ================= */
async function loadHistory(){

  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc&limit=5`,{
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY
      }
    });

    const data=await res.json();

    document.getElementById("history").innerHTML=
      data.map(d=>`
        <div class="history-card">
          KM: ${d.km}<br>
          STATUS: ${d.status}
        </div>
      `).join("");

  }catch(e){}
}

/* ================= INIT ================= */
render();
loadHistory();

</script>

</body>
</html>
